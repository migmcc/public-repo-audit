name: Public Repo Readiness

on:
  push:
  pull_request:

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install ruff pytest
          python -m pip install git+https://github.com/migmcc/public-repo-audit.git

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Audit public readiness
        run: public-repo-audit . --format both

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: public-repo-audit-report
          path: |
            report.md
            report.json
